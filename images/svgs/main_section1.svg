<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Section 1: Build the Tree &amp; Verify</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Insert 50, 30, 70, 20, 40, 60, 80 &#x2014; a balanced BST with height 2</text>

  <!-- Code -->
  <rect x="30" y="68" width="400" height="28" rx="6" fill="#1e1e1e"/>
  <text x="45" y="88" fill="#569cd6" font-size="11" font-family="Consolas, monospace">for (<tspan fill="#569cd6">int</tspan> <tspan fill="#9cdcfe">v</tspan> : {50, 30, 70, 20, 40, 60, 80}) bst.<tspan fill="#dcdcaa">insert</tspan>(v);</text>
  <text x="440" y="88" fill="#888" font-size="10" font-style="italic">range-based for loop with initializer list</text>

  <!-- Tree -->
  <circle cx="450" cy="140" r="22" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">50</text>

  <line x1="432" y1="158" x2="320" y2="198" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="468" y1="158" x2="580" y2="198" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="320" cy="214" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="320" y="219" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>

  <circle cx="580" cy="214" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="580" y="219" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">70</text>

  <line x1="306" y1="230" x2="250" y2="260" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="334" y1="230" x2="390" y2="260" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="566" y1="230" x2="510" y2="260" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="594" y1="230" x2="650" y2="260" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="250" cy="274" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="250" y="279" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">20</text>

  <circle cx="390" cy="274" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="390" y="279" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">40</text>

  <circle cx="510" cy="274" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="510" y="279" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">60</text>

  <circle cx="650" cy="274" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="650" y="279" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">80</text>

  <!-- Info -->
  <rect x="30" y="300" width="840" height="30" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="450" y="320" text-anchor="middle" fill="#1a5276" font-size="12">In-order: 20 30 40 50 60 70 80 (sorted &#x2714;)  |  Height: 2  |  7 nodes, perfectly balanced</text>
</svg>
