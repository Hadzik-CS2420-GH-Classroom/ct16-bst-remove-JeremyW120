<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">remove_() Case 1 &#x2014; Leaf Node (No Children)</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Both left and right are nullptr &#x2014; just delete and return nullptr</text>

  <!-- Code -->
  <rect x="30" y="66" width="400" height="100" rx="8" fill="#1e1e1e"/>
  <text x="50" y="88" fill="#6a9955" font-size="12" font-family="Consolas, monospace">// Case 1: Leaf node &#x2014; no children</text>
  <text x="50" y="110" fill="#569cd6" font-size="12" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">left</tspan> &amp;&amp; !<tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">) {</tspan></text>
  <text x="70" y="130" fill="#569cd6" font-size="12" font-family="Consolas, monospace">delete <tspan fill="#9cdcfe">node</tspan>;</text>
  <text x="70" y="150" fill="#569cd6" font-size="12" font-family="Consolas, monospace">return <tspan fill="#569cd6">nullptr</tspan>;  <tspan fill="#6a9955">// parent&#x2019;s child becomes null</tspan></text>
  <text x="50" y="162" fill="#569cd6" font-size="12" font-family="Consolas, monospace">}</text>

  <!-- Before tree -->
  <text x="580" y="80" text-anchor="middle" fill="#888" font-size="12">Before: remove(20)</text>
  <circle cx="580" cy="120" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="580" y="125" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>
  <line x1="564" y1="136" x2="530" y2="170" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="596" y1="136" x2="630" y2="170" stroke="#bdc3c7" stroke-width="2"/>
  <circle cx="530" cy="190" r="20" fill="#e74c3c" stroke="#c0392b" stroke-width="2.5"/>
  <text x="530" y="195" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">20</text>
  <text x="530" y="220" text-anchor="middle" fill="#e74c3c" font-size="11">leaf &#x2014; delete</text>
  <circle cx="630" cy="190" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="630" y="195" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">40</text>

  <!-- Arrow -->
  <text x="700" y="155" fill="#27ae60" font-size="24">&#x2192;</text>

  <!-- After tree -->
  <text x="800" y="80" text-anchor="middle" fill="#888" font-size="12">After:</text>
  <circle cx="800" cy="120" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="800" y="125" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>
  <line x1="784" y1="136" x2="750" y2="170" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="816" y1="136" x2="850" y2="170" stroke="#bdc3c7" stroke-width="2"/>
  <text x="750" y="190" text-anchor="middle" fill="#bdc3c7" font-size="11">nullptr</text>
  <circle cx="850" cy="190" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="850" y="195" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">40</text>

  <!-- How it works -->
  <rect x="30" y="260" width="840" height="66" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="284" text-anchor="middle" fill="#1a5e32" font-size="13" font-weight="bold">How it works</text>
  <text x="50" y="306" fill="#555" font-size="12">remove_(20) returns <tspan font-family="Consolas, monospace">nullptr</tspan>. The parent (30) sets <tspan font-family="Consolas, monospace">node&#x2192;left = nullptr</tspan> via the recursive return pattern.</text>
</svg>
