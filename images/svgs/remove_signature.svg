<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">remove_() &#x2014; Function Signature</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Understanding each part of the recursive helper&#x2019;s signature</text>

  <!-- Signature code block -->
  <rect x="30" y="66" width="840" height="32" rx="6" fill="#1e1e1e"/>
  <text x="45" y="88" fill="#4ec9b0" font-size="13" font-family="Consolas, monospace">Node* <tspan fill="#dcdcaa">BinarySearchTree::remove_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan>* <tspan fill="#9cdcfe">node</tspan>, <tspan fill="#569cd6">int</tspan> <tspan fill="#9cdcfe">value</tspan>, <tspan fill="#569cd6">bool</tspan>&amp; <tspan fill="#9cdcfe">removed</tspan><tspan fill="#d4d4d4">)</tspan></text>

  <!-- Legend -->
  <rect x="30" y="110" width="840" height="80" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="50" y="124" width="10" height="10" rx="2" fill="#4ec9b0"/>
  <text x="66" y="134" fill="#555" font-size="11" font-family="Consolas, monospace" font-weight="bold">Node*</text>
  <text x="120" y="134" fill="#555" font-size="11">= return type &#x2014; the (possibly changed) subtree root</text>

  <rect x="490" y="124" width="10" height="10" rx="2" fill="#9cdcfe"/>
  <text x="506" y="134" fill="#555" font-size="11" font-family="Consolas, monospace" font-weight="bold">node</text>
  <text x="560" y="134" fill="#555" font-size="11">= current node in the recursion</text>

  <!-- Row 2 -->
  <rect x="50" y="146" width="10" height="10" rx="2" fill="#569cd6"/>
  <text x="66" y="156" fill="#555" font-size="11" font-family="Consolas, monospace" font-weight="bold">int value</text>
  <text x="160" y="156" fill="#555" font-size="11">= the value we want to remove</text>

  <rect x="490" y="146" width="10" height="10" rx="2" fill="#e67e22"/>
  <text x="506" y="156" fill="#555" font-size="11" font-family="Consolas, monospace" font-weight="bold">bool&amp; removed</text>
  <text x="630" y="156" fill="#555" font-size="11">= output param &#x2014; set to true when found</text>

  <!-- Row 3: why return Node*? -->
  <rect x="50" y="168" width="10" height="10" rx="2" fill="#27ae60"/>
  <text x="66" y="176" fill="#555" font-size="11" font-weight="bold">Why return Node*?</text>
  <text x="200" y="176" fill="#555" font-size="11">The parent captures the return: <tspan font-family="Consolas, monospace">node->left = remove_(node->left, ...)</tspan> &#x2014; this is how deleted nodes get &#x201c;unlinked&#x201d;</text>
</svg>
