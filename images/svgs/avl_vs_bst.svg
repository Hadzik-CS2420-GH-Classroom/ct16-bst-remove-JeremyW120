<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">AVL Tree vs. Plain BST</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Same operations, different guarantees</text>

  <rect x="30" y="66" width="840" height="240" rx="10" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Table header -->
  <rect x="30" y="66" width="840" height="36" rx="10" fill="#2c3e50"/>
  <rect x="30" y="86" width="840" height="16" fill="#2c3e50"/>
  <text x="170" y="90" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Property</text>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Plain BST</text>
  <text x="730" y="90" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">AVL Tree</text>

  <!-- Rows -->
  <line x1="310" y1="66" x2="310" y2="306" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="590" y1="66" x2="590" y2="306" stroke="#e0e0e0" stroke-width="1"/>

  <text x="170" y="126" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Search / Insert / Remove</text>
  <text x="450" y="126" text-anchor="middle" fill="#e67e22" font-size="13">O(log n) average, <tspan fill="#e74c3c" font-weight="bold">O(n) worst</tspan></text>
  <text x="730" y="126" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">O(log n) guaranteed</text>
  <line x1="50" y1="140" x2="850" y2="140" stroke="#e0e0e0" stroke-width="1"/>

  <text x="170" y="166" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Height guarantee</text>
  <text x="450" y="166" text-anchor="middle" fill="#e74c3c" font-size="13">None &#x2014; can be n&#x2212;1</text>
  <text x="730" y="166" text-anchor="middle" fill="#27ae60" font-size="13">&#x2264; 1.44 &#xD7; log&#x2082;(n)</text>
  <line x1="50" y1="180" x2="850" y2="180" stroke="#e0e0e0" stroke-width="1"/>

  <text x="170" y="206" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Insert/Remove overhead</text>
  <text x="450" y="206" text-anchor="middle" fill="#27ae60" font-size="13">None &#x2014; just insert/delete</text>
  <text x="730" y="206" text-anchor="middle" fill="#f39c12" font-size="13">Must check BF + maybe rotate</text>
  <line x1="50" y1="220" x2="850" y2="220" stroke="#e0e0e0" stroke-width="1"/>

  <text x="170" y="246" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Implementation complexity</text>
  <text x="450" y="246" text-anchor="middle" fill="#27ae60" font-size="13">Simple</text>
  <text x="730" y="246" text-anchor="middle" fill="#f39c12" font-size="13">More complex (rotations)</text>
  <line x1="50" y1="260" x2="850" y2="260" stroke="#e0e0e0" stroke-width="1"/>

  <text x="170" y="286" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Best for</text>
  <text x="450" y="286" text-anchor="middle" fill="#555" font-size="13">Random data, learning</text>
  <text x="730" y="286" text-anchor="middle" fill="#555" font-size="13">When worst-case matters</text>
</svg>
