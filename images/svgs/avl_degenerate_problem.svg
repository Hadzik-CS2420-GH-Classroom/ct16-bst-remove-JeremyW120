<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">The Problem: Degenerate BSTs</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Insertion order determines tree shape &#x2014; sorted input creates a linked list</text>

  <!-- Balanced tree (random insertion) -->
  <rect x="30" y="72" width="400" height="300" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="230" y="96" text-anchor="middle" fill="#1a5e32" font-size="15" font-weight="bold">Random Insertion: 50, 30, 70, 20, 40</text>
  <text x="230" y="116" text-anchor="middle" fill="#27ae60" font-size="13">Balanced &#x2014; height = 2</text>

  <circle cx="230" cy="160" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="230" y="165" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>
  <line x1="214" y1="176" x2="160" y2="216" stroke="#1e8449" stroke-width="2"/>
  <line x1="246" y1="176" x2="300" y2="216" stroke="#1e8449" stroke-width="2"/>
  <circle cx="160" cy="236" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="160" y="241" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">30</text>
  <circle cx="300" cy="236" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="300" y="241" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">70</text>
  <line x1="146" y1="252" x2="110" y2="288" stroke="#1e8449" stroke-width="2"/>
  <line x1="174" y1="252" x2="210" y2="288" stroke="#1e8449" stroke-width="2"/>
  <circle cx="110" cy="306" r="18" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="110" y="311" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20</text>
  <circle cx="210" cy="306" r="18" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="311" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">40</text>

  <text x="230" y="356" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Search: O(log n) &#x2014; 3 comparisons max</text>

  <!-- Degenerate tree (sorted insertion) -->
  <rect x="470" y="72" width="400" height="300" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="670" y="96" text-anchor="middle" fill="#922b21" font-size="15" font-weight="bold">Sorted Insertion: 10, 20, 30, 40, 50</text>
  <text x="670" y="116" text-anchor="middle" fill="#e74c3c" font-size="13">Degenerate &#x2014; height = 4</text>

  <circle cx="560" cy="150" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="560" y="155" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">10</text>
  <line x1="574" y1="164" x2="610" y2="188" stroke="#c0392b" stroke-width="2"/>
  <circle cx="610" cy="200" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="610" y="205" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20</text>
  <line x1="624" y1="214" x2="660" y2="238" stroke="#c0392b" stroke-width="2"/>
  <circle cx="660" cy="250" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="660" y="255" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>
  <line x1="674" y1="264" x2="710" y2="288" stroke="#c0392b" stroke-width="2"/>
  <circle cx="710" cy="300" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="710" y="305" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">40</text>
  <line x1="724" y1="314" x2="760" y2="338" stroke="#c0392b" stroke-width="2"/>
  <circle cx="760" cy="350" r="18" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="760" y="355" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">50</text>

  <text x="670" y="356" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">Search: O(n) &#x2014; same as linked list!</text>

  <!-- Bottom callout -->
  <rect x="30" y="384" width="840" height="28" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="450" y="404" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">AVL trees fix this by automatically rebalancing after every insert/remove &#x2192; guaranteed O(log n)</text>
</svg>
