<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Left-Right (LR) Case &#x2014; Double Rotation</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">BF = +2 at node, but insertion was into left child&#x2019;s RIGHT subtree &#x2014; single rotation won&#x2019;t fix it</text>

  <!-- Step 1: Before -->
  <rect x="20" y="66" width="260" height="210" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="150" y="86" text-anchor="middle" fill="#922b21" font-size="13" font-weight="bold">Unbalanced</text>

  <circle cx="180" cy="120" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="180" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>
  <text x="206" y="114" fill="#e74c3c" font-size="10">BF=+2</text>
  <line x1="166" y1="134" x2="110" y2="168" stroke="#c0392b" stroke-width="1.5"/>
  <circle cx="110" cy="180" r="18" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="110" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">10</text>
  <text x="136" y="174" fill="#f39c12" font-size="10">BF=&#x2212;1</text>
  <line x1="124" y1="194" x2="155" y2="228" stroke="#d68910" stroke-width="1.5"/>
  <circle cx="155" cy="240" r="16" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="155" y="245" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">20</text>
  <text x="155" y="230" fill="#3498db" font-size="9">new</text>

  <!-- Arrow 1 -->
  <text x="320" y="160" text-anchor="middle" fill="#8e44ad" font-size="12" font-weight="bold">Step 1:</text>
  <text x="320" y="176" text-anchor="middle" fill="#8e44ad" font-size="11">left_rotate(10)</text>
  <text x="320" y="196" text-anchor="middle" fill="#8e44ad" font-size="18">&#x2192;</text>

  <!-- Step 2: After first rotation -->
  <rect x="360" y="66" width="230" height="210" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="475" y="86" text-anchor="middle" fill="#7d6608" font-size="13" font-weight="bold">After left_rotate(10)</text>

  <circle cx="450" cy="120" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>
  <text x="476" y="114" fill="#e74c3c" font-size="10">BF=+2</text>
  <line x1="436" y1="134" x2="400" y2="168" stroke="#c0392b" stroke-width="1.5"/>
  <circle cx="400" cy="180" r="18" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20</text>
  <line x1="386" y1="194" x2="360" y2="228" stroke="#2471a3" stroke-width="1.5"/>
  <circle cx="360" cy="240" r="16" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="360" y="245" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">10</text>
  <text x="475" y="258" text-anchor="middle" fill="#7d6608" font-size="11">Now it&#x2019;s an LL case!</text>

  <!-- Arrow 2 -->
  <text x="625" y="160" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Step 2:</text>
  <text x="625" y="176" text-anchor="middle" fill="#27ae60" font-size="11">right_rotate(30)</text>
  <text x="625" y="196" text-anchor="middle" fill="#27ae60" font-size="18">&#x2192;</text>

  <!-- Final: Balanced -->
  <rect x="660" y="66" width="220" height="210" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="770" y="86" text-anchor="middle" fill="#1a5e32" font-size="13" font-weight="bold">Balanced!</text>

  <circle cx="770" cy="130" r="18" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="770" y="135" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20</text>
  <text x="796" y="124" fill="#27ae60" font-size="10">BF=0</text>
  <line x1="756" y1="144" x2="720" y2="178" stroke="#1e8449" stroke-width="1.5"/>
  <line x1="784" y1="144" x2="820" y2="178" stroke="#1e8449" stroke-width="1.5"/>
  <circle cx="720" cy="192" r="16" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="720" y="197" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">10</text>
  <circle cx="820" cy="192" r="16" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="820" y="197" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">30</text>

  <!-- Bottom callout -->
  <rect x="20" y="290" width="860" height="76" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="314" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Why Two Rotations?</text>
  <text x="40" y="338" fill="#555" font-size="12">A single right rotation on 30 would put 10 at the root with 20 as its right child &#x2014; still unbalanced.</text>
  <text x="40" y="356" fill="#555" font-size="12">The first rotation (left on 10) straightens the zig-zag into an LL case. Then the second rotation (right on 30) balances it.</text>
</svg>
