<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1190" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Why We Need find_min_() &#x2014; Choosing the Right Replacement</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">When removing a node with two children, only one value can take its place without breaking the BST</text>

  <!-- ================================================================ -->
  <!-- ROW 1: THE PROBLEM (left) + ORPHANS (right) -->
  <!-- ================================================================ -->
  <rect x="20" y="66" width="420" height="240" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="230" y="90" text-anchor="middle" fill="#922b21" font-size="14" font-weight="bold">The Problem: Remove 50 &#x2014; Now What?</text>

  <circle cx="230" cy="140" r="20" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="230" y="145" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>
  <text x="260" y="130" fill="#e74c3c" font-size="10" font-weight="bold">&#x2716; remove</text>

  <line x1="214" y1="156" x2="150" y2="190" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="246" y1="156" x2="310" y2="190" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="150" cy="210" r="18" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="150" y="215" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>

  <circle cx="310" cy="210" r="18" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="310" y="215" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">70</text>

  <line x1="138" y1="226" x2="110" y2="252" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="162" y1="226" x2="190" y2="252" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="298" y1="226" x2="270" y2="252" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="322" y1="226" x2="350" y2="252" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="110" cy="268" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="110" y="273" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">20</text>
  <circle cx="190" cy="268" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="190" y="273" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">40</text>
  <circle cx="270" cy="268" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="270" y="273" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">60</text>
  <circle cx="350" cy="268" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="350" y="273" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">80</text>

  <!-- Right panel: orphaned subtrees -->
  <rect x="460" y="66" width="420" height="240" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="670" y="90" text-anchor="middle" fill="#7d6608" font-size="14" font-weight="bold">Just Delete 50? Two Orphaned Subtrees!</text>

  <circle cx="670" cy="132" r="20" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="670" y="137" text-anchor="middle" fill="#ccc" font-size="13" font-weight="bold">50</text>
  <text x="670" y="116" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">deleted</text>

  <line x1="654" y1="148" x2="580" y2="178" stroke="#ccc" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="686" y1="148" x2="760" y2="178" stroke="#ccc" stroke-width="2" stroke-dasharray="5,4"/>

  <rect x="478" y="175" width="145" height="120" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="550" y="193" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">orphaned!</text>
  <circle cx="550" cy="220" r="16" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="550" y="225" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">30</text>
  <line x1="538" y1="234" x2="515" y2="256" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="562" y1="234" x2="585" y2="256" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="515" cy="270" r="13" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="515" y="274" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">20</text>
  <circle cx="585" cy="270" r="13" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="585" y="274" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">40</text>

  <rect x="658" y="175" width="145" height="120" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="730" y="193" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">orphaned!</text>
  <circle cx="730" cy="220" r="16" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="730" y="225" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">70</text>
  <line x1="718" y1="234" x2="700" y2="256" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="742" y1="234" x2="760" y2="256" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="700" cy="270" r="13" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="700" y="274" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">60</text>
  <circle cx="760" cy="270" r="13" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="760" y="274" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">80</text>

  <text x="640" y="270" text-anchor="middle" fill="#e74c3c" font-size="36" font-weight="bold">?</text>

  <!-- ================================================================ -->
  <!-- ROW 2: WHAT DOES THE REPLACEMENT NEED? -->
  <!-- ================================================================ -->
  <rect x="20" y="320" width="860" height="100" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="450" y="346" text-anchor="middle" fill="#4a235a" font-size="14" font-weight="bold">What Properties Must the Replacement Have?</text>

  <rect x="40" y="362" width="380" height="44" rx="8" fill="#ebdef0" stroke="#8e44ad" stroke-width="1"/>
  <text x="50" y="380" fill="#4a235a" font-size="12" font-weight="bold">Rule 1:</text>
  <text x="105" y="380" fill="#555" font-size="12">Must be &gt; everything in the left subtree</text>
  <text x="50" y="397" fill="#8e44ad" font-size="11" font-style="italic">&#x2192; replacement must come FROM the right subtree</text>

  <rect x="460" y="362" width="410" height="44" rx="8" fill="#ebdef0" stroke="#8e44ad" stroke-width="1"/>
  <text x="470" y="380" fill="#4a235a" font-size="12" font-weight="bold">Rule 2:</text>
  <text x="525" y="380" fill="#555" font-size="12">Must be &lt; everything else in the right subtree</text>
  <text x="470" y="397" fill="#8e44ad" font-size="11" font-style="italic">&#x2192; it must be the SMALLEST value in the right subtree</text>

  <!-- ================================================================ -->
  <!-- ROW 3: find_min_ IN ACTION on the right subtree -->
  <!-- ================================================================ -->
  <rect x="20" y="434" width="860" height="180" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="460" text-anchor="middle" fill="#1a5276" font-size="14" font-weight="bold">find_min_() Walks the Right Subtree to Find the Smallest Value</text>

  <!-- Right subtree extracted, showing the walk -->
  <text x="60" y="492" fill="#2980b9" font-size="12" font-weight="bold">Start: node&#x2192;right</text>

  <!-- Walk arrow: start label to 70 -->
  <path d="M 175 488 L 208 500" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Node 70 -->
  <circle cx="230" cy="520" r="20" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="230" y="525" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">70</text>

  <!-- Edge 70 → 60 (highlighted) -->
  <line x1="214" y1="536" x2="150" y2="572" stroke="#e67e22" stroke-width="3"/>
  <!-- Edge 70 → 80 -->
  <line x1="246" y1="536" x2="300" y2="572" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- "go left" label — offset right of the edge -->
  <text x="200" y="560" fill="#e67e22" font-size="10" font-weight="bold">&#x2190; go left</text>

  <!-- Node 60 — the answer -->
  <circle cx="150" cy="590" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2.5"/>
  <text x="150" y="595" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>

  <!-- Node 80 -->
  <circle cx="300" cy="590" r="16" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="300" y="595" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">80</text>

  <!-- no left child label — far left of node 60 -->
  <text x="35" y="582" fill="#27ae60" font-size="10" font-weight="bold">60 has no left child</text>
  <text x="35" y="596" fill="#27ae60" font-size="10" font-weight="bold">&#x2192; 60 is the min!</text>

  <!-- The logic chain — right side -->
  <rect x="370" y="478" width="490" height="120" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1"/>

  <text x="390" y="502" fill="#1a5276" font-size="12" font-weight="bold">Connecting the dots:</text>

  <text x="400" y="526" fill="#555" font-size="12">1. We need the smallest value in the right subtree</text>
  <text x="720" y="526" fill="#1a5276" font-size="11" font-style="italic">(Rule 1 + Rule 2)</text>

  <text x="400" y="550" fill="#555" font-size="12">2. find_min_() walks left until there&#x2019;s no left child</text>
  <text x="720" y="550" fill="#1a5276" font-size="11" font-style="italic">(that&#x2019;s the minimum)</text>

  <text x="400" y="574" fill="#27ae60" font-size="12" font-weight="bold">3. find_min_(node&#x2192;right) = in-order successor = 60</text>

  <!-- ================================================================ -->
  <!-- ROW 4: IN-ORDER TRAVERSAL CONFIRMATION -->
  <!-- ================================================================ -->
  <rect x="20" y="628" width="860" height="140" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="652" text-anchor="middle" fill="#7d6608" font-size="13" font-weight="bold">Confirm: 60 Is the In-Order Successor (Next Value in Sorted Order)</text>
  <text x="450" y="670" text-anchor="middle" fill="#999" font-size="11">In-order traversal visits nodes in this order &#x2014; not an array, just the BST read left-to-right</text>

  <!-- In-order boxes — pushed down to leave room for arrow + label -->
  <rect x="120" y="710" width="40" height="30" rx="5" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
  <text x="140" y="730" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">20</text>

  <rect x="200" y="710" width="40" height="30" rx="5" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
  <text x="220" y="730" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>

  <rect x="280" y="710" width="40" height="30" rx="5" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
  <text x="300" y="730" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">40</text>

  <rect x="360" y="710" width="40" height="30" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="380" y="730" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>

  <rect x="440" y="710" width="40" height="30" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="2.5"/>
  <text x="460" y="730" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>

  <rect x="520" y="710" width="40" height="30" rx="5" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
  <text x="540" y="730" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">70</text>

  <rect x="600" y="710" width="40" height="30" rx="5" fill="#fef5e7" stroke="#f39c12" stroke-width="1"/>
  <text x="620" y="730" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">80</text>

  <!-- Arrow from 50 to 60 — arcs between title and boxes -->
  <path d="M 400 710 C 406 678 454 678 460 710" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="430" y="678" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">next</text>

  <!-- Labels below -->
  <text x="380" y="754" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="bold">remove</text>
  <text x="460" y="754" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">successor</text>

  <text x="700" y="724" fill="#7d6608" font-size="11" font-weight="bold">In-order successor =</text>
  <text x="700" y="740" fill="#7d6608" font-size="11">next value in sorted order</text>

  <!-- ================================================================ -->
  <!-- ROW 5: HOW IT ACTUALLY WORKS — two steps -->
  <!-- ================================================================ -->
  <rect x="20" y="782" width="860" height="400" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="808" text-anchor="middle" fill="#1a5e32" font-size="14" font-weight="bold">How It Works: The Node Stays, Only the Value Changes</text>
  <text x="450" y="826" text-anchor="middle" fill="#777" font-size="11">We don&#x2019;t move or remove the node holding 50 &#x2014; we overwrite its data, then delete the duplicate</text>

  <!-- Step 1 -->
  <rect x="40" y="842" width="390" height="130" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="235" y="862" text-anchor="middle" fill="#1a5e32" font-size="12" font-weight="bold">Step 1: Overwrite the value (no pointers change)</text>

  <!-- Before node -->
  <circle cx="110" cy="915" r="20" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="110" y="920" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>
  <text x="110" y="890" text-anchor="middle" fill="#888" font-size="9">before</text>

  <!-- Arrow -->
  <text x="170" y="920" text-anchor="middle" fill="#27ae60" font-size="20">&#x2192;</text>

  <!-- After node -->
  <circle cx="230" cy="915" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="230" y="920" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>
  <text x="230" y="890" text-anchor="middle" fill="#888" font-size="9">after</text>

  <!-- Code -->
  <rect x="280" y="893" width="135" height="38" rx="4" fill="#1e1e1e"/>
  <text x="290" y="910" fill="#9cdcfe" font-size="9" font-family="Consolas, monospace">node->data =</text>
  <text x="290" y="925" fill="#9cdcfe" font-size="9" font-family="Consolas, monospace">  successor->data;</text>

  <text x="60" y="960" fill="#555" font-size="10">Same node, same pointers, same position in the tree</text>

  <!-- Step 2 -->
  <rect x="460" y="842" width="400" height="130" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="660" y="862" text-anchor="middle" fill="#922b21" font-size="12" font-weight="bold">Step 2: Delete the original 60 from right subtree</text>

  <!-- Mini right subtree — before -->
  <circle cx="540" cy="895" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="540" y="900" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">70</text>

  <line x1="530" y1="907" x2="508" y2="922" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="550" y1="907" x2="572" y2="922" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="508" cy="934" r="12" fill="#e74c3c" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="508" y="938" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">60</text>

  <circle cx="572" cy="934" r="12" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="572" y="938" text-anchor="middle" fill="#2c3e50" font-size="9" font-weight="bold">80</text>

  <text x="480" y="920" fill="#e74c3c" font-size="8">delete &#x2192;</text>

  <!-- Arrow between before/after -->
  <text x="630" y="915" fill="#e74c3c" font-size="18">&#x2192;</text>

  <!-- Mini right subtree — after -->
  <circle cx="720" cy="895" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="720" y="900" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">70</text>
  <line x1="730" y1="907" x2="752" y2="922" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="752" cy="934" r="12" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="752" y="938" text-anchor="middle" fill="#2c3e50" font-size="9" font-weight="bold">80</text>

  <text x="480" y="960" fill="#555" font-size="10">60 was a leaf &#x2014; easy Case 1!</text>

  <!-- Final tree -->
  <text x="250" y="1000" text-anchor="middle" fill="#1a5e32" font-size="13" font-weight="bold">Final Tree:</text>

  <!-- Root: 60 -->
  <circle cx="250" cy="1034" r="20" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="250" y="1039" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>

  <line x1="234" y1="1050" x2="160" y2="1078" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="266" y1="1050" x2="340" y2="1078" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="160" cy="1092" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="160" y="1097" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">30</text>

  <circle cx="340" cy="1092" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="340" y="1097" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">70</text>

  <line x1="147" y1="1106" x2="110" y2="1126" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="173" y1="1106" x2="210" y2="1126" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="353" y1="1106" x2="390" y2="1126" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="110" cy="1140" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="110" y="1145" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">20</text>

  <circle cx="210" cy="1140" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="210" y="1145" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">40</text>

  <circle cx="390" cy="1140" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="390" y="1145" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">80</text>

  <!-- BST verification -->
  <text x="560" y="1030" fill="#1a5e32" font-size="11" font-weight="bold">Why 60 works:</text>
  <text x="570" y="1050" fill="#555" font-size="11">&#x2022; Larger than left subtree (20, 30, 40 &lt; 60) &#x2714;</text>
  <text x="570" y="1070" fill="#555" font-size="11">&#x2022; Smaller than rest of right subtree (60 &lt; 70, 80) &#x2714;</text>
  <text x="570" y="1090" fill="#555" font-size="11">&#x2022; BST property preserved at every node &#x2714;</text>
  <text x="560" y="1120" fill="#27ae60" font-size="12" font-weight="bold">20 &lt; 30 &lt; 40 &lt; 60 &lt; 70 &lt; 80 &#x2714;</text>
</svg>
