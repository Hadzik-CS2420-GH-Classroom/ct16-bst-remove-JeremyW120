<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 370" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Section 3: Remove 60 (Case 2 &#x2014; One Child)</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">First insert 65 to give 60 a right child, then remove 60 &#x2014; 65 gets promoted</text>

  <!-- Before: after inserting 65 -->
  <text x="200" y="76" text-anchor="middle" fill="#888" font-size="12">After inserting 65, before remove(60):</text>

  <circle cx="200" cy="115" r="20" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="200" y="120" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>

  <line x1="184" y1="131" x2="130" y2="163" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="216" y1="131" x2="270" y2="163" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="130" cy="178" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="130" y="183" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">30</text>

  <circle cx="270" cy="178" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="270" y="183" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">70</text>

  <line x1="143" y1="193" x2="175" y2="218" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="257" y1="193" x2="220" y2="218" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="283" y1="193" x2="320" y2="218" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="175" cy="232" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="175" y="237" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">40</text>

  <circle cx="220" cy="232" r="15" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="220" y="237" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">60</text>
  <text x="210" y="258" text-anchor="middle" fill="#e74c3c" font-size="9">delete this</text>

  <circle cx="320" cy="232" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="320" y="237" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">80</text>

  <!-- 60's only child: 65 -->
  <line x1="232" y1="245" x2="250" y2="268" stroke="#3498db" stroke-width="2"/>
  <circle cx="250" cy="280" r="14" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">65</text>
  <text x="280" y="283" fill="#3498db" font-size="9">only child</text>

  <!-- After -->
  <text x="650" y="76" text-anchor="middle" fill="#888" font-size="12">After remove(60):</text>

  <circle cx="650" cy="115" r="20" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="650" y="120" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">50</text>

  <line x1="634" y1="131" x2="580" y2="163" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="666" y1="131" x2="720" y2="163" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="580" cy="178" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="580" y="183" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">30</text>

  <circle cx="720" cy="178" r="17" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="720" y="183" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">70</text>

  <line x1="593" y1="193" x2="625" y2="218" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="707" y1="193" x2="680" y2="218" stroke="#3498db" stroke-width="2.5"/>
  <line x1="733" y1="193" x2="760" y2="218" stroke="#bdc3c7" stroke-width="1.5"/>

  <circle cx="625" cy="232" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="625" y="237" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">40</text>

  <circle cx="680" cy="232" r="15" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="680" y="237" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">65</text>
  <text x="680" y="254" text-anchor="middle" fill="#3498db" font-size="9">promoted</text>

  <circle cx="760" cy="232" r="15" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="760" y="237" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">80</text>

  <!-- Info -->
  <rect x="30" y="310" width="840" height="50" rx="8" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="330" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">Case 2: One child &#x2014; 65 bypasses 60 and takes its spot</text>
  <text x="450" y="348" text-anchor="middle" fill="#555" font-size="11">In-order after: 30 40 50 65 70 80  |  remove(60) returned true</text>
</svg>
